<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>AtrhasGPT</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

  <!-- Шапка -->
  <header class="header">
    <div class="header-left">
      <div class="avatar">🤖</div>
      <div class="header-info">
        <span class="header-name">AtrhasGPT</span>
        <span class="header-status" id="statusText">онлайн</span>
      </div>
    </div>
    <button class="clear-btn" id="clearBtn" title="Новый чат">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="1 4 1 10 7 10"></polyline>
        <path d="M3.51 15a9 9 0 1 0 .49-3.51"></path>
      </svg>
    </button>
  </header>

  <!-- Сообщения -->
  <main class="messages" id="messages">
    <div class="welcome-block">
      <div class="welcome-icon">🤖</div>
      <h2>AtrhasGPT</h2>
      <p>Привет! Я твой умный ассистент.<br>Спроси меня что угодно!</p>
    </div>
  </main>

  <!-- Превью изображения -->
  <div class="image-preview" id="imagePreview" style="display:none;">
    <img id="previewImg" src="" alt="preview" />
    <button class="remove-img" id="removeImg">✕</button>
    <span id="previewName" class="preview-name"></span>
  </div>

  <!-- Ввод -->
  <footer class="input-area">
    <button class="attach-btn" id="attachBtn" title="Прикрепить фото">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
        <circle cx="8.5" cy="8.5" r="1.5"></circle>
        <polyline points="21 15 16 10 5 21"></polyline>
      </svg>
    </button>

    <input type="file" id="fileInput" accept="image/*" style="display:none;" />

    <div class="textarea-wrap">
      <textarea
        id="userInput"
        placeholder="Напиши сообщение..."
        rows="1"
        maxlength="4000"
      ></textarea>
    </div>

    <button class="send-btn" id="sendBtn" disabled>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
      </svg>
    </button>
  </footer>

  <script src="app.js"></script>
</body>
</html>
