<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Immortal GPT</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0b0e14; color: white; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; margin: 0; justify-content: center; align-items: center; }
        .card { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); padding: 30px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.1); width: 80%; text-align: center; }
        input { width: 100%; padding: 15px; border-radius: 12px; border: none; background: rgba(255,255,255,0.1); color: white; margin-bottom: 20px; box-sizing: border-box; outline: none; }
        button { width: 100%; padding: 15px; border-radius: 12px; border: none; background: #5865f2; color: white; font-weight: bold; cursor: pointer; }
        button:active { transform: scale(0.98); }
    </style>
</head>
<body>
    <div class="card">
        <h2>Immortal GPT</h2>
        <input type="text" id="msgInput" placeholder="Введите ваш вопрос...">
        <button onclick="send()">ОТПРАВИТЬ</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        async function send() {
            const text = document.getElementById('msgInput').value;
            const user_id = tg.initDataUnsafe?.user?.id;

            if (!text || !user_id) return;

            // СЮДА ВСТАВЬ ССЫЛКУ ИЗ NGROK
            const SERVER_URL = "https://ВАШ_АДРЕС_ИЗ_NGROK.ngrok-free.app/web-data";

            try {
                await fetch(SERVER_URL, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ user_id: user_id, text: text })
                });
                tg.close(); // Закрываем окно после отправки
            } catch (e) {
                alert("Ошибка соединения с сервером!");
            }
        }
    </script>
</body>
</html>
