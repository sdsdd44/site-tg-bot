<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>ArthasGPT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
 
  <!-- Ambient orbs -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="noise"></div>
 
  <!-- Sakura petals -->
  <div id="sakura-container"></div>
 
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-brand">
        <span class="brand-mark">A</span>
        <span class="brand-name">ArthasGPT</span>
      </div>
      <button class="icon-btn" id="sidebarClose" aria-label="Close">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
 
    <button class="new-chat-btn" id="newChatBtn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Новый чат
    </button>
 
    <div class="chats-label">История</div>
 
    <div class="chats-list" id="chatsList"></div>
 
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="user-avatar">A</div>
        <div class="user-info">
          <span class="user-name">ArthasGPT User</span>
          <span class="user-status">● online</span>
        </div>
      </div>
    </div>
  </aside>
 
  <div class="overlay" id="overlay"></div>
 
  <!-- Main -->
  <div class="app" id="app">
 
    <header class="header">
      <button class="icon-btn" id="menuBtn" aria-label="Menu">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
 
      <div class="header-center">
        <span class="header-title" id="headerTitle">ArthasGPT</span>
        <span class="header-dot"></span>
      </div>
 
      <button class="icon-btn" id="newChatIcon" aria-label="New chat">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
      </button>
    </header>
 
    <main class="messages" id="messages">
      <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-glyph">✦</div>
        <div class="welcome-title">ArthasGPT</div>
        <div class="welcome-sub">Чем могу помочь сегодня?</div>
        <div class="welcome-cards">
          <div class="welcome-card" onclick="setPrompt('Объясни что такое квантовые компьютеры')">
            <span class="card-icon">⟡</span>
            Квантовые компьютеры
          </div>
          <div class="welcome-card" onclick="setPrompt('Напиши код простого сайта на HTML')">
            <span class="card-icon">◈</span>
            Сайт на HTML
          </div>
          <div class="welcome-card" onclick="setPrompt('Придумай идею для проекта на Python')">
            <span class="card-icon">◇</span>
            Идея Python-проекта
          </div>
          <div class="welcome-card" onclick="setPrompt('Что такое Liquid Glass дизайн?')">
            <span class="card-icon">◉</span>
            Liquid Glass дизайн
          </div>
        </div>
      </div>
    </main>
 
    <!-- Image preview -->
    <div class="image-preview-bar" id="imagePreviewBar" style="display:none;">
      <img id="previewImg" src="" alt="" />
      <span id="previewName"></span>
      <button id="removeImg" class="icon-btn small">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
 
    <footer class="input-area">
      <div class="input-glass">
        <button class="attach-btn" id="attachBtn" aria-label="Attach image">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        </button>
        <input type="file" id="fileInput" accept="image/*" style="display:none;" />
        <textarea id="userInput" placeholder="Напиши сообщение…" rows="1"></textarea>
        <button class="send-btn" id="sendBtn" disabled>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
      <div class="input-hint">ArthasGPT может ошибаться — проверяй важное</div>
    </footer>
 
  </div>
 
  <script src="app.js"></script>
  <script>
    // Sakura petals (ported from personal site)
    (function() {
      const sakura = document.getElementById('sakura-container');
      const palettes = [
        ['rgba(232,64,90,0.35)', 'rgba(200,80,110,0.18)'],
        ['rgba(123,97,255,0.30)', 'rgba(160,130,255,0.15)'],
        ['rgba(255,255,255,0.12)', 'rgba(200,200,255,0.06)'],
      ];
      const isMobile = window.innerWidth < 768;
      const interval = isMobile ? 2200 : 1100;
 
      function spawnPetal() {
        if (document.hidden) return;
        const el = document.createElement('div');
        el.className = 'petal';
        const [c1, c2] = palettes[Math.floor(Math.random() * palettes.length)];
        const size = (4 + Math.random() * 7) + 'px';
        const dur = 14 + Math.random() * 10;
        el.style.cssText = `
          left:${Math.random()*100}vw;
          width:${size}; height:${size};
          background:linear-gradient(135deg,${c1},${c2});
          --dx:${(Math.random()-0.5)*60}px;
          animation-duration:${dur}s;
          animation-delay:${Math.random()*2}s;
          border-radius:${50+Math.random()*20}% ${40+Math.random()*20}% ${40+Math.random()*20}% ${50+Math.random()*20}% / ${50+Math.random()*20}% ${50+Math.random()*20}% ${40+Math.random()*20}% ${40+Math.random()*20}%;
        `;
        sakura.appendChild(el);
        setTimeout(() => el.remove(), (dur + 2) * 1000);
      }
 
      const n = isMobile ? 2 : 5;
      for (let i = 0; i < n; i++) setTimeout(spawnPetal, i * 300);
      let t = setInterval(spawnPetal, interval);
      document.addEventListener('visibilitychange', () => {
        if (document.hidden) clearInterval(t);
        else t = setInterval(spawnPetal, interval);
      });
    })();
  </script>
</body>
</html>
