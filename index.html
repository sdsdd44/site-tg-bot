<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>AtrhasGPT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

  <!-- Фоновые блобы -->
  <div class="bg-blob blob-1"></div>
  <div class="bg-blob blob-2"></div>
  <div class="bg-blob blob-3"></div>

  <!-- Боковое меню -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-logo">AtrhasGPT</span>
      <button class="sidebar-close" id="sidebarClose">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>

    <button class="new-chat-btn" id="newChatBtn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="12" y1="5" x2="12" y2="19"></line>
        <line x1="5" y1="12" x2="19" y2="12"></line>
      </svg>
      Новый чат
    </button>

    <div class="chats-label">История чатов</div>

    <div class="chats-list" id="chatsList">
      <!-- Чаты добавляются динамически -->
    </div>

    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="user-avatar">A</div>
        <span>AtrhasGPT User</span>
      </div>
    </div>
  </aside>

  <!-- Оверлей -->
  <div class="overlay" id="overlay"></div>

  <!-- Основной контент -->
  <div class="app" id="app">

    <!-- Шапка -->
    <header class="header">
      <button class="menu-btn" id="menuBtn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <line x1="3" y1="12" x2="21" y2="12"></line>
          <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
      </button>

      <span class="header-title" id="headerTitle">AtrhasGPT</span>

      <button class="new-chat-icon" id="newChatIcon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 20h9"></path>
          <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
        </svg>
      </button>
    </header>

    <!-- Сообщения -->
    <main class="messages" id="messages">
      <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-title">AtrhasGPT</div>
        <div class="welcome-sub">Чем могу помочь?</div>
        <div class="welcome-cards">
          <div class="welcome-card" onclick="setPrompt('Объясни что такое квантовые компьютеры')">
            Объясни что такое квантовые компьютеры
          </div>
          <div class="welcome-card" onclick="setPrompt('Напиши код простого сайта на HTML')">
            Напиши код простого сайта на HTML
          </div>
          <div class="welcome-card" onclick="setPrompt('Придумай идею для проекта на Python')">
            Придумай идею для проекта на Python
          </div>
          <div class="welcome-card" onclick="setPrompt('Что такое Liquid Glass дизайн?')">
            Что такое Liquid Glass дизайн?
          </div>
        </div>
      </div>
    </main>

    <!-- Превью изображения -->
    <div class="image-preview-bar" id="imagePreviewBar" style="display:none;">
      <img id="previewImg" src="" alt="" />
      <span id="previewName"></span>
      <button id="removeImg">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>

    <!-- Ввод -->
    <footer class="input-area">
      <div class="input-glass">
        <button class="attach-btn" id="attachBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2"></rect>
            <circle cx="8.5" cy="8.5" r="1.5"></circle>
            <polyline points="21 15 16 10 5 21"></polyline>
          </svg>
        </button>
        <input type="file" id="fileInput" accept="image/*" style="display:none;" />
        <textarea
          id="userInput"
          placeholder="Напиши сообщение..."
          rows="1"
        ></textarea>
        <button class="send-btn" id="sendBtn" disabled>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
          </svg>
        </button>
      </div>
      <div class="input-hint">AtrhasGPT может ошибаться. Проверяй важную информацию.</div>
    </footer>

  </div>

  <script src="app.js"></script>
</body>
</html>
