<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Immortal App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Стеклянный дизайн (Liquid Glass) */
        body {
            background: #000;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        .container {
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .glass-input {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 15px;
            color: white;
            font-size: 16px;
            margin-bottom: 10px;
            outline: none;
        }
        .send-btn {
            background: linear-gradient(90deg, #8E2DE2, #4A00E0);
            border: none;
            border-radius: 15px;
            padding: 15px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .send-btn:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div class="container">
        <h2 id="greeting">Привет!</h2>
        <input type="text" id="user_input" class="glass-input" placeholder="Напиши что-нибудь...">
        <button class="send-btn" onclick="sendToBot()">ОТПРАВИТЬ БОТУ</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Раскрываем на всё окно
        
        // Показываем имя пользователя
        if (tg.initDataUnsafe?.user) {
            document.getElementById('greeting').innerText = `Привет, ${tg.initDataUnsafe.user.first_name}!`;
        }

        function sendToBot() {
            const text = document.getElementById('user_input').value;
            if (text.trim() !== "") {
                tg.sendData(text); // Отправляем текст боту
            }
        }
    </script>
</body>
</html>
